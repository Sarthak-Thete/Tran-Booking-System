# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────────────
# Change username/password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/railbook_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# update  → keeps existing data, adds new columns
# create  → drops and recreates tables on every restart (use for first run)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CORS (allow React dev server) ───────────────────────────
# Handled in CorsConfig.java
